# MongoDB
apiVersion: apps/v1
kind: Deployment
metadata: { name: mongo-deployment }
spec:
  replicas: 1
  selector: { matchLabels: { app: mongo } }
  template:
    metadata: { labels: { app: mongo } }
    spec:
      containers:
      - name: mongo
        image: mongo:latest
        ports: [{ containerPort: 27017 }]
        env:
        - { name: MONGO_INITDB_ROOT_USERNAME, value: "root" }
        - { name: MONGO_INITDB_ROOT_PASSWORD, value: "example" }
---
apiVersion: v1
kind: Service
metadata: { name: mongo-service }
spec:
  selector: { app: mongo }
  ports: [{ port: 27017 }]
---
# Redis
apiVersion: apps/v1
kind: Deployment
metadata: { name: redis-deployment }
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
      - name: redis
        image: redis:latest
        ports: [{ containerPort: 6379 }]
        command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
        env:
        - name: REDIS_PASSWORD
          valueFrom: { secretKeyRef: { name: expensy-secrets, key: REDIS_PASSWORD } }
---
apiVersion: v1
kind: Service
metadata: { name: redis-service }
spec:
  selector: { app: redis }
  ports: [{ port: 6379 }]
