version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: expensy_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example

  redis:
    image: redis:latest
    container_name: expensy_redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass someredispassword

  backend:
    build: ./expensy_backend
    container_name: expensy_backend
    ports:
      - "8706:8706"
    environment:
      PORT: 8706
      DATABASE_URI: mongodb://root:example@mongodb:27017/?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: someredispassword
    depends_on:
      - mongodb
      - redis

  frontend:
    build: ./expensy_frontend
    container_name: expensy_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8706
    depends_on:
      - backend
